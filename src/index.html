<html>

<head>
    <title>xrmitch</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <meta charset="UTF-8">
    <meta name="description" content="aframe xrmitch">
    <meta name="keywords" content="AFrame, JavaScript">
    <meta name="author" content="Mitch Allen">
    <meta name="last-modified" content="2026-03-08T07:10:09">
    <meta name="commit-id" content="abc">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <a-scene button-movement>
        <a-entity id="rig" position="0 0 0">
            <a-camera id="camera" look-controls="enabled: true">
            </a-camera>
            <a-entity oculus-touch-controls="hand: left" thumbstick-move-where-looking></a-entity>
            <a-entity oculus-touch-controls="hand: right" thumbstick-logging></a-entity>
        </a-entity>
        <a-sky grid-sky></a-sky>
    </a-scene>
    <div class="buttonBar">
        <button id="btnHome" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">home</span>
        </button>
        <button id="btnForward" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">arrow_upward</span>
        </button>
        <button id="btnBack" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">arrow_downward</span>
        </button>
        <button disabled id="btnHelp" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">help_outline</span>
        </button>
    </div>
    <script type="module" src="./app.js"></script>
</body>

</html>
