<html>

<head>
    <title>xrmitch</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <meta charset="UTF-8">
    <meta name="description" content="aframe xrmitch">
    <meta name="keywords" content="AFrame, JavaScript">
    <meta name="author" content="Mitch Allen">
    <meta name="last-modified" content="2026-03-08T06:24:35">
    <meta name="commit-id" content="abc">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <a-scene button-movement>
        <a-entity id="rig" position="0 0 0">
            <a-camera id="camera" look-controls="enabled: true">
                <!-- <a-cursor></a-cursor> -->
            </a-camera>
            <a-entity oculus-touch-controls="hand: left" thumbstick-move-where-looking></a-entity>
            <a-entity oculus-touch-controls="hand: right" thumbstick-logging></a-entity>
        </a-entity>
        <!-- <a-entity id="maze-lines-30x30-30-neon-green"
            gltf-model="url(https://olive-flying-parrotfish-580.mypinata.cloud/ipfs/Qmdrqj17UoyxritJmJdzpcR8Uwep3iiB631D1QtvHTcyTb)"
            rotation="0 0 0" position="0.0 1.6 0" scale="0.12 0.12 0.12">
        </a-entity> -->
        <a-entity id="marble-alpha"
            gltf-model="./models/marble-alpha.glb"
            rotation="0 0 0" position="0.0 1.6 -20.0" scale="2.5 2.5 2.5"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 40000; easing: linear">
        </a-entity>
        <a-sphere color="black" position="0.0 1.6 -20.0"></a-sphere>
        <a-entity id="maze-cube-15x15-15-neon-fat"
            gltf-model="./models/maze-cube-15x15-15-neon-fat.glb"
            rotation="0 0 0" position="0.0 1.6 20" scale="0.5 0.5 0.5">
        </a-entity>
        <a-entity id="maze-lines-30x30-30-neon-green"
            gltf-model="./models/maze-lines-30x30-30-neon-green.glb"
            rotation="0 0 0" position="0.0 1.6 0" scale="0.12 0.12 0.12">
        </a-entity>
        <!-- <a-plane position="0 0 0" rotation="-90 0 0" width="2" height="40" color="#444444"></a-plane> -->
        <a-sky color="#333333"></a-sky>
    </a-scene>
    <div class="buttonBar">
        <button id="btnHome" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">home</span>
        </button>
        <button id="btnForward" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">arrow_upward</span>
        </button>
        <button id="btnBack" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">arrow_downward</span>
        </button>
        <button disabled id="btnHelp" type="button" class="button-toolbar">
            <span class="material-icons md-light md-48">help_outline</span>
        </button>
    </div>
    <script type="module" src="./app.js"></script>
</body>

</html>
